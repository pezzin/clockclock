<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clock-Clock Display</title>
<link rel="stylesheet" href="/style.css">
<style>
  html,body{ height:100%; overflow:hidden; }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 50% 32%, #f2f1ee 0%, #e6e5e2 55%, #d8d7d3 100%);
  }

  /* Il pannello: una lastra bianca "fissata al muro", con bezel generoso
     e un'ombra morbida e sfalsata che dà l'idea di profondità reale. */
  .frame{
    position:relative;
    background:#fbfbfa;
    padding: clamp(26px, 5.5vmin, 80px) clamp(34px, 7vmin, 100px);
    border-radius:10px;
    box-shadow:
      0 1px 2px rgba(0,0,0,.08),
      0 18px 40px -12px rgba(0,0,0,.28),
      0 50px 90px -30px rgba(0,0,0,.22);
  }
  /* leggero riflesso in alto per dare volume alla lastra */
  .frame::before{
    content:'';
    position:absolute; inset:0;
    border-radius:inherit;
    background:linear-gradient(155deg, rgba(255,255,255,.55), rgba(255,255,255,0) 30%);
    pointer-events:none;
  }
  /* ombra proiettata sul "muro" sotto il pannello */
  .frame::after{
    content:'';
    position:absolute; left:8%; right:8%; bottom:-22px; height:34px;
    background:radial-gradient(ellipse at center, rgba(0,0,0,.22), transparent 72%);
    filter:blur(4px);
    z-index:-1;
  }

  #status{
    position:fixed;
    bottom:16px;
    left:18px;
    color:var(--text-dim);
    font-size:12px;
    transition:opacity .6s ease;
  }
  #credit{
    position:fixed;
    bottom:6px;
    left:50%;
    transform:translateX(-50%);
    color:var(--text-dim);
    font-size:10px;
    opacity:.6;
    transition:opacity .6s ease;
  }
  #fsBtn{
    position:fixed;
    bottom:14px;
    right:16px;
    width:34px;
    height:34px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.35);
    color:#fff;
    font-size:15px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:opacity .6s ease, background .2s ease;
  }
  #fsBtn:hover{ background:rgba(0,0,0,.55); }

  body.idle #status, body.idle #fsBtn, body.idle #credit{ opacity:0; pointer-events:none; }
  body.idle.is-fullscreen{ cursor:none; }
</style>
</head>
<body>
<div class="frame"><div class="grid" id="grid"></div></div>
<div id="status">connessione...</div>
<div id="credit">made by @pezzin</div>
<button id="fsBtn" title="Schermo intero (o doppio click)">⛶</button>

<script src="/socket.io/socket.io.js"></script>
<script src="/clock-font.js"></script>
<script src="/clock-grid.js"></script>
<script>
const grid = ClockGrid.create(document.getElementById('grid'), { rows: 3, cols: 8 });

const statusEl = document.getElementById('status');
const socket = io();

socket.on('connect', () => { statusEl.textContent = 'connesso'; });
socket.on('disconnect', () => { statusEl.textContent = 'disconnesso — riconnessione...'; });
socket.on('state', (state) => grid.applyState(state));

// --- fullscreen, per proiettare pulito su un monitor esterno ---
const fsBtn = document.getElementById('fsBtn');
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
fsBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('dblclick', toggleFullscreen);
document.addEventListener('fullscreenchange', () => {
  document.body.classList.toggle('is-fullscreen', !!document.fullscreenElement);
  fsBtn.textContent = document.fullscreenElement ? '⤡' : '⛶';
  grid.fitToViewport();
});

// --- nasconde status/pulsante (e il cursore, a schermo intero) dopo inattivita' ---
let idleTimer;
function resetIdle(){
  document.body.classList.remove('idle');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => document.body.classList.add('idle'), 4000);
}
['mousemove','touchstart','click'].forEach(ev => window.addEventListener(ev, resetIdle));
resetIdle();
</script>
</body>
</html>
