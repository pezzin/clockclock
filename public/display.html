<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clock-Clock Display</title>
<link rel="stylesheet" href="/style.css">
<style>
  html,body{
    height:100%;
    overflow:hidden;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #status{
    position:fixed;
    bottom:14px;
    left:18px;
    color:var(--text-dim);
    font-size:12px;
  }
</style>
</head>
<body>
<div class="panel"><div class="grid" id="grid"></div></div>
<div id="status">connessione...</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/clock-font.js"></script>
<script src="/clock-grid.js"></script>
<script>
const grid = ClockGrid.create(document.getElementById('grid'), { rows: 3, cols: 8 });

const statusEl = document.getElementById('status');
const socket = io();

socket.on('connect', () => { statusEl.textContent = 'connesso'; });
socket.on('disconnect', () => { statusEl.textContent = 'disconnesso — riconnessione...'; });
socket.on('state', (state) => grid.applyState(state));
</script>
</body>
</html>
