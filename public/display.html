<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clock-Clock Display</title>
<style>
  html,body{
    margin:0;
    height:100%;
    background:#0a0a0a;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(8, 9vmin);
    grid-template-rows:repeat(3, 9vmin);
    gap:1.2vmin;
  }
  .digit-gap{margin-right:3vmin;}
  .clock{
    position:relative;
    width:9vmin;
    height:9vmin;
    border-radius:50%;
    background:#fdfdfd;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.15), 0 3px 6px rgba(0,0,0,.4);
  }
  .hand{
    position:absolute;
    left:50%;
    top:50%;
    width:.7vmin;
    height:3.9vmin;
    background:#111;
    border-radius:1vmin;
    transform-origin:50% 100%;
    margin-left:-.35vmin;
    margin-top:-3.9vmin;
    transition:transform .7s cubic-bezier(.65,0,.35,1);
  }
  #status{
    position:fixed;
    bottom:10px;
    left:14px;
    color:#333;
    font-family:sans-serif;
    font-size:11px;
  }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<div id="status">connessione...</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/clock-font.js"></script>
<script>
const gridEl = document.getElementById('grid');
const clocks = [];

for(let r=0;r<3;r++){
  for(let c=0;c<8;c++){
    const clockDiv = document.createElement('div');
    clockDiv.className='clock';
    if(c===1||c===3||c===5) clockDiv.classList.add('digit-gap');
    const h1=document.createElement('div'); h1.className='hand';
    const h2=document.createElement('div'); h2.className='hand';
    clockDiv.appendChild(h1); clockDiv.appendChild(h2);
    gridEl.appendChild(clockDiv);
    clocks.push({h1,h2,cum1:135,cum2:135});
  }
}

function cellIndex(r,c){ return r*8+c; }

function setHandTarget(hand, cumProp, obj, targetDeg){
  let current = obj[cumProp];
  let currentMod = ((current%360)+360)%360;
  let delta = targetDeg - currentMod;
  if(delta>180) delta-=360;
  if(delta<-180) delta+=360;
  obj[cumProp] = current + delta;
  hand.style.transform = `rotate(${obj[cumProp]}deg)`;
}

function showDigit(digit, digitIndex){
  for(let localRole=0; localRole<6; localRole++){
    const r = Math.floor(localRole/2);
    const localCol = localRole%2;
    const c = digitIndex*2+localCol;
    const idx = cellIndex(r,c);
    const [a1,a2] = ClockFont.anglesForCell(digit, localRole);
    const clk = clocks[idx];
    setHandTarget(clk.h1,'cum1',clk,a1);
    setHandTarget(clk.h2,'cum2',clk,a2);
  }
}

function showNumber(str){
  const chars = String(str).padStart(4,' ').slice(-4).split('');
  chars.forEach((ch,i)=>{
    const d = /[0-9]/.test(ch) ? parseInt(ch,10) : undefined;
    showDigit(d,i);
  });
}

function parkAll(){
  for(let r=0;r<3;r++) for(let c=0;c<8;c++){
    const localRole = r*2 + (c%2);
    const park = ClockFont.ROLES[localRole].park;
    const idx = cellIndex(r,c);
    const clk = clocks[idx];
    setHandTarget(clk.h1,'cum1',clk,park);
    setHandTarget(clk.h2,'cum2',clk,park);
  }
}

function showWave(){
  clocks.forEach((clk, idx) => {
    const phase = (idx*24)%360;
    setHandTarget(clk.h1,'cum1',clk,phase);
    setHandTarget(clk.h2,'cum2',clk,(phase+180)%360);
  });
}

let liveTimer=null;
function startLive(){
  stopLive();
  tickLive();
  liveTimer = setInterval(tickLive,1000);
}
function stopLive(){
  if(liveTimer){ clearInterval(liveTimer); liveTimer=null; }
}
function tickLive(){
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,'0');
  const mm=String(now.getMinutes()).padStart(2,'0');
  showNumber(hh+mm);
}

// --- connessione al server: riceve lo stato deciso dall'admin ---
const statusEl = document.getElementById('status');
const socket = io();

socket.on('connect', () => { statusEl.textContent = 'connesso'; });
socket.on('disconnect', () => { statusEl.textContent = 'disconnesso — riconnessione...'; });

socket.on('state', (state) => {
  if(state.mode === 'live'){
    startLive();
  } else {
    stopLive();
    if(state.mode === 'custom') showNumber(state.customDigits || '');
    else if(state.mode === 'wave') showWave();
    else if(state.mode === 'park') parkAll();
  }
});
</script>
</body>
</html>
