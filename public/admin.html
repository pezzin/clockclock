<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clock-Clock Admin</title>
<link rel="stylesheet" href="/style.css">
<style>
  body{
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; gap:20px;
  }
  h1{font-size:15px;font-weight:600;color:var(--text);margin:0;letter-spacing:.5px;}
  .panel{ max-width:94vw; overflow:auto; }
  .controls{display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;max-width:520px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
  input[type=text]{font-size:18px;letter-spacing:4px;text-align:center;padding:8px 12px;border-radius:8px;border:1px solid #bbb;width:160px;}
  button{font-size:13px;padding:9px 14px;border-radius:8px;border:1px solid #bbb;background:#fff;cursor:pointer;color:#333;}
  button:hover{background:#eee;}
  button.active{background:#111;color:#fff;border-color:#111;}
  .status{font-size:12px;color:var(--text-dim);}
  .status.ok{color:#2a8f4a;}
  .status.bad{color:#c0392b;}
  a.disp-link{font-size:12px;color:#555;}
  .section-label{font-size:11px;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;margin-top:4px;}
</style>
</head>
<body>

<h1>CLOCK · CLOCK — ADMIN</h1>

<div class="panel"><div class="grid" id="grid"></div></div>

<div class="controls">
  <div class="row">
    <button id="btnLive">Ora attuale</button>
    <button id="btnCustom">Numero personalizzato</button>
    <button id="btnPark">Tutti chiusi</button>
  </div>
  <div class="row">
    <button id="btnWave">Onda</button>
    <button id="btnPinwheel">Girandola</button>
    <button id="btnRipple">Increspatura</button>
  </div>
  <div class="row" id="customRow" style="display:none;">
    <input type="text" id="digits" placeholder="es. 2035">
    <button id="applyDigits">Mostra</button>
  </div>

  <div class="section-label">Dimensione griglia</div>
  <div class="row" id="sizeRow"></div>

  <div class="status" id="conn">connessione...</div>
  <a class="disp-link" href="/display" target="_blank">apri pagina display in una nuova scheda →</a>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/clock-font.js"></script>
<script src="/clock-grid.js"></script>
<script>
const GRID_PRESETS = [
  { key:'8x3',  rows:3, cols:8,  label:'8×3 · standard (24 orologi)' },
  { key:'12x3', rows:3, cols:12, label:'12×3 · largo (36 orologi)' },
  { key:'16x3', rows:3, cols:16, label:'16×3 · extra largo (48 orologi)' },
  { key:'12x6', rows:6, cols:12, label:'12×6 · grande (72 orologi)' },
];

const grid = ClockGrid.create(document.getElementById('grid'), { rows: 3, cols: 8 });

const btnLive=document.getElementById('btnLive');
const btnCustom=document.getElementById('btnCustom');
const btnWave=document.getElementById('btnWave');
const btnPinwheel=document.getElementById('btnPinwheel');
const btnRipple=document.getElementById('btnRipple');
const btnPark=document.getElementById('btnPark');
const customRow=document.getElementById('customRow');
const digitsInput=document.getElementById('digits');
const applyDigits=document.getElementById('applyDigits');
const sizeRow=document.getElementById('sizeRow');

const sizeButtons = {};
GRID_PRESETS.forEach(preset=>{
  const b=document.createElement('button');
  b.textContent=preset.label;
  b.addEventListener('click', ()=> socket.emit('setState', { rows: preset.rows, cols: preset.cols }));
  sizeRow.appendChild(b);
  sizeButtons[preset.key]=b;
});

function setActiveByMode(mode){
  [btnLive,btnCustom,btnWave,btnPinwheel,btnRipple,btnPark].forEach(b=>b.classList.remove('active'));
  ({live:btnLive,custom:btnCustom,wave:btnWave,pinwheel:btnPinwheel,ripple:btnRipple,park:btnPark})[mode]?.classList.add('active');
  customRow.style.display = mode==='custom' ? 'flex' : 'none';
}
function setActiveBySize(rows,cols){
  Object.values(sizeButtons).forEach(b=>b.classList.remove('active'));
  const preset=GRID_PRESETS.find(p=>p.rows===rows && p.cols===cols);
  if(preset) sizeButtons[preset.key].classList.add('active');
}

const socket = io();
const connEl = document.getElementById('conn');
socket.on('connect', ()=>{ connEl.textContent='connesso al server'; connEl.className='status ok'; });
socket.on('disconnect', ()=>{ connEl.textContent='disconnesso — riconnessione...'; connEl.className='status bad'; });

socket.on('state', (state)=>{
  grid.applyState(state);
  setActiveByMode(state.mode);
  setActiveBySize(state.rows||3, state.cols||8);
});

btnLive.addEventListener('click', ()=> socket.emit('setState', {mode:'live'}));
btnWave.addEventListener('click', ()=> socket.emit('setState', {mode:'wave'}));
btnPinwheel.addEventListener('click', ()=> socket.emit('setState', {mode:'pinwheel'}));
btnRipple.addEventListener('click', ()=> socket.emit('setState', {mode:'ripple'}));
btnPark.addEventListener('click', ()=> socket.emit('setState', {mode:'park'}));
btnCustom.addEventListener('click', ()=>{
  setActiveByMode('custom');
  digitsInput.focus();
});
applyDigits.addEventListener('click', ()=>{
  socket.emit('setState', {mode:'custom', customDigits:digitsInput.value||''});
});
digitsInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') applyDigits.click(); });
</script>
</body>
</html>
